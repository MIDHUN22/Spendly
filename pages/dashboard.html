<!-- Dashboard page fragment (loaded via fetch into #page-dashboard) -->
<div class="greeting-row fade-up">
  <div>
    <div class="greeting-text">Good morning</div>
    <div class="greeting-name" id="dash-greeting-name">User 👋</div>
  </div>
  <div class="text-right">
    <div class="greeting-date" id="dash-date"></div>
    <div class="text-xs text-muted mt-4" id="dash-time"></div>
  </div>
</div>

<!-- Hero card -->
<div class="hero-card fade-up mb-16">
  <div class="hero-label">Total Spent — This Month</div>
  <div class="hero-amount font-mono" id="dash-month-total">₹0</div>
  <div class="mt-12" style="height:56px; position:relative;">
    <canvas id="sparkline-canvas" class="sparkline-canvas"></canvas>
  </div>
  <div class="text-xs text-secondary mt-8" style="opacity:0.6;">Last 7 days spending</div>
</div>

<!-- Metric cards -->
<div class="metric-grid mb-20 fade-up">
  <div class="metric-card">
    <div class="metric-label">Today</div>
    <div class="metric-value font-mono" id="dash-today">₹0</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">This Week</div>
    <div class="metric-value font-mono" id="dash-week">₹0</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">This Month</div>
    <div class="metric-value font-mono" id="dash-month">₹0</div>
  </div>
</div>

<!-- Recent transactions -->
<div class="fade-up">
  <div class="section-header">
    <span class="section-title">Recent Transactions</span>
    <a class="section-link" href="#" onclick="navigateTo('history'); return false;">See all →</a>
  </div>
  <div id="dash-recent-list" class="txn-list">
    <!-- populated by JS -->
  </div>
</div>

<!-- Empty state for dashboard -->
<div id="dash-empty" class="empty-state hidden">
  <div class="empty-state-icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#8888a8" stroke-width="1.5">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
    </svg>
  </div>
  <h3>No expenses yet</h3>
  <p>Tap the <strong>+</strong> button to add your first expense</p>
</div>
